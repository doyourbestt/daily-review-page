<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>元气复盘局 | 每一天都在发光发热</title>
    <meta name="description" content="元气复盘局 - Xiaohongshu风格的每日团队复盘分享社区">
    
    <!-- Preload & Preconnect -->
    <link rel="preload" href="./data/reviews.json" as="fetch" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase Client (load before config) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="./css/xhs-base.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #FAFAFA;
            padding-top: 60px; /* Account for fixed nav */
        }

        /* Hero Section - Keep existing video */
        .hero {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
        }

        .hero-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .hero-video.loaded {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(26,26,26,0.3) 0%, rgba(26,26,26,0.6) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: white;
            padding: 0 24px;
        }

        .hero-title {
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 400;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Section */
        .section {
            padding: 64px 0;
        }

        .section-title {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            margin-bottom: 48px;
            text-align: center;
            background: linear-gradient(135deg, #FF2442 0%, #FF6B35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Intro */
        .intro {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 48px;
        }

        .intro h2 {
            font-size: clamp(24px, 4vw, 32px);
            color: #333;
            margin-bottom: 16px;
        }

        .intro p {
            font-size: clamp(14px, 2vw, 16px);
            line-height: 1.8;
            color: #666;
        }

        /* Team Grid */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        @media (max-width: 480px) {
            .team-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF2442 0%, #FF6B35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Summary */
        .summary {
            background: linear-gradient(135deg, #FF2442 0%, #FF6B35 100%);
            color: white;
            padding: 64px 0;
            text-align: center;
        }

        .summary-content {
            max-width: 800px;
            margin: 0 auto;
            font-size: clamp(14px, 2vw, 16px);
            line-height: 1.8;
        }

        .summary h2 {
            font-size: clamp(28px, 5vw, 40px);
            margin-bottom: 24px;
        }

        /* Footer */
        .footer {
            background: #1A1A1A;
            color: #E8E8E8;
            padding: 48px 0;
            text-align: center;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-date {
            font-size: 14px;
            color: #6B6B6B;
        }

        .footer-credit {
            font-size: 16px;
        }

        .footer-credit a {
            color: #FF2442;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-credit a:hover {
            color: #FF6B35;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Navigation Bar -->
    <nav class="xhs-nav">
        <a href="/" class="xhs-nav-logo">元气复盘局</a>
        <div class="xhs-nav-actions">
            <button class="xhs-btn-login" id="showLoginBtn" style="display: flex;">登录</button>
            <div class="xhs-user-avatar" id="userAvatar">
                <span class="user-avatar-text">U</span>
                <div class="xhs-user-menu" id="userMenu">
                    <div class="xhs-user-menu-header">
                        <div class="xhs-user-menu-name" id="userMenuUsername">User</div>
                        <div class="xhs-user-menu-email" id="userMenuEmail">user@example.com</div>
                    </div>
                    <button class="xhs-user-menu-item" id="profileBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        我的主页
                    </button>
                    <button class="xhs-user-menu-item" id="adminPanelBtn" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                        </svg>
                        管理后台
                    </button>
                    <button class="xhs-user-menu-item danger" id="logoutBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                        </svg>
                        退出登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Modal -->
    <div class="xhs-auth-overlay" id="authOverlay"></div>
    <div class="xhs-auth-modal" id="authModal">
        <button class="xhs-auth-close" id="closeAuthModal">×</button>
        
        <div class="xhs-auth-header">
            <h2>欢迎来到元气复盘局</h2>
            <p>发现更多精彩分享</p>
        </div>
        
        <div class="xhs-auth-tabs">
            <button class="xhs-auth-tab active" id="loginTab">登录</button>
            <button class="xhs-auth-tab" id="registerTab">注册</button>
        </div>
        
        <!-- Login Form -->
        <form class="xhs-auth-form active" id="loginForm">
            <div class="xhs-auth-input-group">
                <input type="email" name="email" placeholder="邮箱地址" required>
            </div>
            <div class="xhs-auth-input-group">
                <input type="password" name="password" placeholder="密码" required>
            </div>
            <button type="submit" class="xhs-btn-primary">登录</button>
        </form>
        
        <!-- Register Form -->
        <form class="xhs-auth-form" id="registerForm">
            <div class="xhs-auth-input-group">
                <input type="text" name="username" placeholder="用户名" required>
            </div>
            <div class="xhs-auth-input-group">
                <input type="email" name="email" placeholder="邮箱地址" required>
            </div>
            <div class="xhs-auth-input-group">
                <input type="password" name="password" placeholder="密码（至少6位）" required minlength="6">
            </div>
            <div class="xhs-auth-input-group">
                <input type="password" name="confirmPassword" placeholder="确认密码" required>
            </div>
            <button type="submit" class="xhs-btn-primary">注册</button>
        </form>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-video-container">
            <video class="hero-video" id="heroVideo" muted loop playsinline preload="none">
                <source src="./videos/hero_compressed.mp4" type="video/mp4">
            </video>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">元气复盘局</h1>
            <p class="hero-subtitle" id="heroSubtitle">每一天都在发光发热 ✨</p>
        </div>
    </section>

    <!-- Introduction Section -->
    <section class="section" id="introSection">
        <div class="container">
            <div class="intro" id="introContent">
                <!-- Dynamic content -->
            </div>
        </div>
    </section>

    <!-- Team Section -->
    <section class="section" id="teamSection">
        <div class="container">
            <h2 class="section-title">🧩 每位伙伴的元气干货速递</h2>
            <div class="team-grid" id="teamGrid">
                <!-- Dynamic content -->
            </div>
        </div>
    </section>

    <!-- Summary Section -->
    <section class="summary" id="summarySection">
        <div class="container">
            <div class="summary-content">
                <h2>✨ 元气总结</h2>
                <p id="summaryText"><!-- Dynamic content --></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-date" id="footerDate">2026-02-11</div>
                <div class="footer-credit">
                    Crafted with ❤️ by <a href="#">Matrix Agent</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- App Scripts (in order) -->
    <script src="./config.js"></script>
    <script src="./js/supabase-client.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/interactions.js"></script>
    <script src="./js/realtime.js"></script>
    
    <!-- Main App Script -->
    <script>
        (function() {
            'use strict';
            
            // State
            let currentDate = '2026-02-11';
            let reviewsData = {};
            
            // DOM Elements
            const elements = {
                loading: document.getElementById('loading'),
                heroVideo: document.getElementById('heroVideo'),
                heroTitle: document.getElementById('heroTitle'),
                heroSubtitle: document.getElementById('heroSubtitle'),
                introContent: document.getElementById('introContent'),
                teamGrid: document.getElementById('teamGrid'),
                summaryText: document.getElementById('summaryText'),
                footerDate: document.getElementById('footerDate')
            };
            
            // Initialize App
            async function init() {
                try {
                    // Load reviews data
                    await loadReviews();
                    
                    // Render content
                    renderContent(currentDate);
                    
                    // Initialize video
                    initVideo();
                    
                    // Hide loading
                    setTimeout(() => {
                        elements.loading.style.opacity = '0';
                        setTimeout(() => {
                            elements.loading.style.display = 'none';
                        }, 500);
                        
                        initAnimations();
                    }, 800);
                    
                } catch (error) {
                    console.error('Failed to initialize app:', error);
                    showToast('加载失败，请刷新页面');
                }
            }
            
            // Load reviews data
            async function loadReviews() {
                // Try to load from Supabase first
                if (window.SUPABASE_AVAILABLE) {
                    try {
                        const { data, error } = await window.SUPABASE_CLIENT
                            .from('reviews')
                            .select('*')
                            .order('date', { ascending: false });
                        
                        if (!error && data && data.length > 0) {
                            reviewsData = {};
                            data.forEach(review => {
                                reviewsData[review.date] = {
                                    title: review.title,
                                    subtitle: review.subtitle,
                                    intro: review.intro,
                                    people: review.people,
                                    summary: review.summary
                                };
                            });
                            currentDate = data[0].date;
                            console.log('✅ Loaded reviews from Supabase');
                            return;
                        }
                    } catch (error) {
                        console.warn('Failed to load from Supabase, falling back to JSON');
                    }
                }
                
                // Fall back to JSON
                const response = await fetch('./data/reviews.json');
                reviewsData = await response.json();
                const dates = Object.keys(reviewsData).sort().reverse();
                currentDate = dates[0];
                console.log('✅ Loaded reviews from JSON');
            }
            
            // Initialize Video
            function initVideo() {
                const video = elements.heroVideo;
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            video.load();
                            observer.unobserve(video);
                        }
                    });
                });
                
                observer.observe(video);
                
                video.addEventListener('loadeddata', () => {
                    video.play().then(() => {
                        video.classList.add('loaded');
                    }).catch(err => {
                        console.warn('Video autoplay failed:', err);
                    });
                });
            }
            
            // Render Content
            async function renderContent(date) {
                const data = reviewsData[date];
                if (!data) return;
                
                // Update hero
                elements.heroTitle.textContent = data.title || '元气复盘局';
                elements.heroSubtitle.textContent = data.subtitle || '每一天都在发光发热 ✨';
                
                // Update intro
                if (data.intro) {
                    elements.introContent.innerHTML = `
                        <h2>${data.intro.heading || ''}</h2>
                        <p>${data.intro.content || ''}</p>
                    `;
                }
                
                // Render person cards
                const peopleHtml = await Promise.all(data.people.map(person => renderPersonCard(date, person)));
                elements.teamGrid.innerHTML = peopleHtml.join('');
                
                // Update summary
                elements.summaryText.textContent = data.summary || '';
                
                // Update footer
                elements.footerDate.textContent = date;
                
                // Attach event listeners
                attachInteractionListeners();
                
                // Subscribe to realtime updates
                if (window.RealtimeModule) {
                    window.RealtimeModule.subscribeToReview(date);
                }
            }
            
            // Render Person Card
            async function renderPersonCard(date, person) {
                const personKey = `${date}:${person.name}`;
                
                // Get interaction states
                const likeCount = await window.InteractionsModule.getLikeCount(date, person.name);
                const commentCount = await window.InteractionsModule.getCommentCount(date, person.name);
                const comments = await window.InteractionsModule.getComments(date, person.name, 5);
                const isLiked = await window.InteractionsModule.isLikedByCurrentUser(date, person.name);
                const isFavorited = await window.InteractionsModule.isFavoritedByCurrentUser(date, person.name);
                
                const contentArray = Array.isArray(person.content) ? person.content : [person.content];
                
                return `
                    <div class="xhs-person-card" data-person-key="${personKey}">
                        <div class="xhs-card-header">
                            <div class="xhs-card-avatar">
                                <span class="xhs-card-emoji">${person.emoji || '👤'}</span>
                            </div>
                            <div class="xhs-card-author">
                                <div class="xhs-card-name">${person.name}</div>
                                <div class="xhs-card-role">${person.role || '团队成员'}</div>
                            </div>
                        </div>
                        
                        <div class="xhs-card-body">
                            <ul class="xhs-card-content-list">
                                ${contentArray.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="xhs-card-actions">
                            <button class="xhs-action-btn ${isLiked ? 'active' : ''}" data-action="like" data-person-key="${personKey}">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                </svg>
                                <span class="xhs-action-count">${likeCount}</span>
                            </button>
                            
                            <button class="xhs-action-btn" data-action="comment" data-person-key="${personKey}">
                                <svg viewBox="0 0 24 24">
                                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                                </svg>
                                <span class="xhs-action-count">${commentCount}</span>
                            </button>
                            
                            <button class="xhs-action-btn ${isFavorited ? 'active' : ''}" data-action="favorite" data-person-key="${personKey}">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="xhs-card-comments" data-person-key="${personKey}">
                            <div class="xhs-comments-list">
                                ${comments.map(c => `
                                    <div class="xhs-comment-item">
                                        <div class="xhs-comment-avatar"></div>
                                        <div class="xhs-comment-content">
                                            <div class="xhs-comment-header">
                                                <span class="xhs-comment-username">${escapeHtml(c.username)}</span>
                                                <span class="xhs-comment-time">${formatTimeAgo(c.created_at)}</span>
                                            </div>
                                            <p class="xhs-comment-text">${escapeHtml(c.content)}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="xhs-comment-input-box">
                                <div class="xhs-comment-input-avatar"></div>
                                <input type="text" class="xhs-comment-input" placeholder="说说你的想法..." data-person-key="${personKey}">
                                <button class="xhs-comment-send" data-person-key="${personKey}">发送</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Attach Interaction Listeners
            function attachInteractionListeners() {
                // Like buttons
                document.querySelectorAll('[data-action="like"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const personKey = this.dataset.personKey;
                        const [date, name] = personKey.split(':');
                        window.InteractionsModule.toggleLike(date, name, this);
                    });
                });
                
                // Comment toggles
                document.querySelectorAll('[data-action="comment"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const personKey = this.dataset.personKey;
                        const commentsSection = document.querySelector(`.xhs-card-comments[data-person-key="${personKey}"]`);
                        commentsSection.classList.toggle('expanded');
                    });
                });
                
                // Favorite buttons
                document.querySelectorAll('[data-action="favorite"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const personKey = this.dataset.personKey;
                        const [date, name] = personKey.split(':');
                        window.InteractionsModule.toggleFavorite(date, name, this);
                    });
                });
                
                // Comment send buttons
                document.querySelectorAll('.xhs-comment-send').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const personKey = this.dataset.personKey;
                        const [date, name] = personKey.split(':');
                        const input = document.querySelector(`.xhs-comment-input[data-person-key="${personKey}"]`);
                        window.InteractionsModule.postComment(date, name, input.value, input);
                    });
                });
                
                // Comment input enter key
                document.querySelectorAll('.xhs-comment-input').forEach(input => {
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            const personKey = this.dataset.personKey;
                            const [date, name] = personKey.split(':');
                            window.InteractionsModule.postComment(date, name, this.value, this);
                        }
                    });
                });
            }
            
            // Initialize Animations
            function initAnimations() {
                gsap.registerPlugin(ScrollTrigger);
                
                gsap.from('.hero-title', {
                    opacity: 0,
                    scale: 1.05,
                    duration: 1.2,
                    ease: 'power3.out'
                });
                
                gsap.from('.hero-subtitle', {
                    opacity: 0,
                    y: 20,
                    duration: 0.8,
                    delay: 0.6,
                    ease: 'power2.out'
                });
                
                gsap.utils.toArray('.xhs-person-card').forEach((card, index) => {
                    gsap.from(card, {
                        opacity: 0,
                        y: 50,
                        duration: 0.8,
                        delay: index * 0.05,
                        ease: 'power2.out',
                        scrollTrigger: {
                            trigger: card,
                            start: 'top 85%',
                            toggleActions: 'play none none none'
                        }
                    });
                });
            }
            
            // Utilities
            function formatTimeAgo(dateString) {
                const date = new Date(dateString);
                const now = new Date();
                const seconds = Math.floor((now - date) / 1000);
                
                if (seconds < 60) return '刚刚';
                if (seconds < 3600) return `${Math.floor(seconds / 60)}分钟前`;
                if (seconds < 86400) return `${Math.floor(seconds / 3600)}小时前`;
                if (seconds < 604800) return `${Math.floor(seconds / 86400)}天前`;
                
                return date.toLocaleDateString('zh-CN');
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
            
            // Initialize on load
            window.addEventListener('load', init);
            
        })();
    </script>
</body>
</html>
